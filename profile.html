<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saborize - Perfil</title>
    <link rel="stylesheet" href="assets/css/profile.css">
</head>
<body>
    <main class="profile-section">

        <section class="user-container">
            <img src="/assets/img/profile-test.png" alt="Imagem do usuário" class="user-photo">
            <div class="user-info">
                <h1 id="username">Peter Green</h1>
                <div class="user-status">
                    <p id="user-posts">0 posts</p>
                    <p id="user-followers">0 seguidores</p>
                    <p id="user-following">0 seguindo</p>
                </div>
                <div class="user-config">
                    <div class="photo-edit">
                        <a class="profile-buttons" href="/edit-photo"><img src="/assets/svg/gallery-svgrepo-com.svg" alt="Icone de galeria"> <span>Editar foto</span></a>
                    </div>
                    <div class="profile-edit">
                        <a class="profile-buttons" href="/edit-profile"><img src="/assets/svg/config.svg" alt="Icone de engrenagem"><span>Configurações</span></a>
                    </div>
                </div>
            </div>
        </section>

        <hr>

        <figure class="gallery">   <!-- Aqui os dados seriam chamados pelo database, vou simular manualmente -->
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
            <img src="/assets/img/gallery-test.png" alt="" class="gallery-photos">
        </figure>
    </main>
</body>
</html>
